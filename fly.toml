# fly.toml – Fly.io deployment configuration for tunapay-tx-classifier
app = "tunapay-tx-classifier"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  SOLANA_RPC_URL    = "https://api.mainnet-beta.solana.com"
  FREE_TIER_LIMIT   = "100"
  PRICE_PER_REQUEST = "0.005"
  BASE_URL          = "https://tunapay-tx-classifier.fly.dev"
  LOG_LEVEL         = "INFO"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/health"
    port          = 8080
    timeout       = "5s"
    type          = "http"
